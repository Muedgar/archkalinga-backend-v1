services:
  postgres:
    image: postgres:16-alpine
    container_name: archkalinga-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d archkalinga"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: archkalinga-redis
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: archkalinga-backend:latest
    container_name: archkalinga-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      SERVER_PORT: 7007
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDISHOST: redis
      REDISPORT: 6379
      SEND_MAIL: ${SEND_MAIL:-false}
    ports:
      - "7007:7007"

volumes:
  postgres_data:
  redis_data:
